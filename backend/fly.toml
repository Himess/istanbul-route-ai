# Fly.io config for Istanbul Route AI backend
# Deploy from this directory:  fly launch --no-deploy  → then fly secrets set ... → fly deploy

app = "istanbul-route-ai-backend"
primary_region = "fra"  # Frankfurt — closest to Turkey / low latency

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  ARC_TESTNET_RPC_URL = "https://rpc.testnet.arc.network"
  CONTRACT_ADDRESS = "0xD117bDB3d1463a1B47561eb74BEa88ebE93B81CF"
  PARKING_CONTRACT_ADDRESS = "0x198be13482770fa01e36ae199f8e6873ad2f7b91"
  OSRM_URL = "https://router.project-osrm.org"
  ROUTE_VEHICLE_RADIUS_METERS = "300"
  GEMINI_MODEL = "gemini-2.5-flash"
  AGENT_TX_MODE = "simulated"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "off"   # keep always-on so demo has no cold start
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
